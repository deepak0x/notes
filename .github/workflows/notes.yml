name: notes

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: notes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run
        id: scan
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/run.sh

      - name: Notify
        if: steps.scan.outputs.new_count != '0'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TG_TOKEN}" ] || [ -z "${TG_CHAT}" ]; then
            echo "secrets not set; skipping."; exit 0
          fi
          MSG="$(head -c 3900 message.txt)"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" \
            --data "disable_web_page_preview=true" >/dev/null && echo "Sent."

      - name: Save
        run: |
          if git diff --quiet -- state.json; then echo "No change."; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "adding notes"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase --autostash origin master || true
          done
          git push
